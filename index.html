<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <title>DUNGEON FLICKER</title>
        <link rel="stylesheet" href="/styles/main.css" />
        <link rel="preload" href="/images/barbarian-nobg.png" as="image" />
        <link rel="preload" href="/images/wizard-nobg.png" as="image" />
        <link rel="preload" href="/images/necromancer-nobg.png" as="image" />
        <link rel="preload" href="/images/rogue-nobg.png" as="image" />
    </head>
    <body>
        <script type="module" src="/main.js"></script>

        <div id="black-overlay"></div>
        <div id="disc-info-popup" class="popup element-hidden">
            <h4>
                <span class="name">Disc Name</span>
                <span class="hp">HP: X/Y</span>
            </h4>
            <div class="description">Empty for now</div>
        </div>
        <div id="throw-info"></div>
        <div id="disc-names">
            <ul id="disc-names-list"></ul>
        </div>

        <div id="powers-area">
            <button id="rage-button">Rage!</button>
        </div>
        <div id="fps-counter">FPS: --</div>
    </body>
</html>
