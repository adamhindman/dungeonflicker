<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <title>DUNGEON FLICKER</title>
        <link rel="stylesheet" href="/styles/main.css" />
    </head>
    <body>
        <script type="module" src="/main.js"></script>

        <div id="black-overlay"></div>
        <div id="disc-info-popup" class="popup element-hidden">
            <h4>
                <span class="name">Disc Name</span>
                <span class="hp">HP: X/Y</span>
            </h4>
            <div class="description">Empty for now</div>
        </div>
        <div id="throw-info"></div>
        <div id="disc-names">
            <ul id="disc-names-list"></ul>
        </div>

        <div id="powers-area">
            <button id="rage-button">Rage!</button>
        </div>
        <div id="fps-counter">FPS: --</div>

        <!-- DEV: clear first-time-event metrics from localStorage -->
        <button id="clear-first-time-events-btn"
                style="position:fixed;bottom:8px;left:8px;z-index:9999;font-size:10px;
                       padding:3px 7px;opacity:0.55;cursor:pointer;"
                title="Clear all first-time event records from localStorage">
          Clear Metrics
        </button>
        <script type="module">
          import { firstTimeEvents } from '/js/FirstTimeEvents.js';
          document.getElementById('clear-first-time-events-btn')
            .addEventListener('click', () => {
              firstTimeEvents.clear();
            });
        </script>
    </body>
</html>
